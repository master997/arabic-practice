<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egyptian Arabic Practice</title>
<style>
  :root {
    --bg: #f6f4ef;
    --card: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #0d7a5f;
    --accent-soft: #e0f0eb;
    --danger: #b4462e;
    --danger-soft: #f7e5df;
    --chip: #ece9e1;
    --chip-active: #1a1a1a;
    --chip-active-ink: #ffffff;
    --border: #e2ded4;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  [data-theme="dark"] {
    --bg: #14161a;
    --card: #1f2229;
    --ink: #eceae4;
    --muted: #9a9890;
    --accent: #4ecfa5;
    --accent-soft: #1d3830;
    --danger: #e0785c;
    --danger-soft: #3a231b;
    --chip: #2a2e37;
    --chip-active: #eceae4;
    --chip-active-ink: #14161a;
    --border: #30343d;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 16px; transition: background 0.25s, color 0.25s;
  }
  .arabic { font-family: "Geeza Pro", "Noto Naskh Arabic", "Traditional Arabic", serif; direction: rtl; }
  header {
    width: 100%; max-width: 760px; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 14px;
  }
  header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; }
  header .controls { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--chip); border: none; color: var(--ink); border-radius: 10px;
    padding: 7px 12px; font-size: 0.82rem; cursor: pointer; font-weight: 600;
  }
  .icon-btn:hover { opacity: 0.85; }
  .decks {
    width: 100%; max-width: 760px; display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .deck-chip {
    background: var(--chip); border: none; color: var(--ink); border-radius: 999px;
    padding: 7px 13px; font-size: 0.8rem; cursor: pointer; font-weight: 600;
    transition: background 0.15s;
  }
  .deck-chip.active { background: var(--chip-active); color: var(--chip-active-ink); }
  .meta-row {
    width: 100%; max-width: 760px; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px; font-size: 0.8rem; color: var(--muted);
  }
  .meta-row .right { display: flex; gap: 8px; align-items: center; }
  .card-zone { width: 100%; max-width: 760px; perspective: 1200px; }
  .flashcard {
    width: 100%; min-height: 320px; background: var(--card); border-radius: 20px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 36px 28px; cursor: pointer; position: relative;
    transition: transform 0.12s;
  }
  .flashcard:active { transform: scale(0.99); }
  .flashcard .deck-label {
    position: absolute; top: 16px; left: 20px; font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
  }
  .flashcard .star {
    position: absolute; top: 12px; right: 16px; font-size: 1.3rem; background: none;
    border: none; cursor: pointer; color: var(--muted); opacity: 0.45;
  }
  .flashcard .star.on { opacity: 1; color: #d9a406; }
  .front-text.arabic { font-size: 2.7rem; line-height: 1.7; }
  .front-text.english { font-size: 1.7rem; font-weight: 650; line-height: 1.4; }
  .back-text.arabic { font-size: 2.1rem; line-height: 1.7; margin-top: 18px; color: var(--accent); }
  .back-text.english { font-size: 1.25rem; font-weight: 600; margin-top: 18px; color: var(--accent); }
  .example {
    margin-top: 20px; padding-top: 16px; border-top: 1px dashed var(--border);
    font-size: 1.15rem; color: var(--muted); line-height: 1.8; max-width: 90%;
  }
  .example .arabic { font-size: 1.45rem; color: var(--ink); }
  .hint { margin-top: 22px; font-size: 0.75rem; color: var(--muted); }
  .top100-tag {
    display: inline-block; margin-top: 14px; font-size: 0.68rem; font-weight: 700;
    background: var(--accent-soft); color: var(--accent); padding: 3px 10px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .grade-row {
    width: 100%; max-width: 760px; display: flex; gap: 10px; margin-top: 14px;
  }
  .grade-btn {
    flex: 1; padding: 15px; border-radius: 14px; border: none; font-size: 0.95rem;
    font-weight: 700; cursor: pointer;
  }
  .grade-btn.again { background: var(--danger-soft); color: var(--danger); }
  .grade-btn.got { background: var(--accent-soft); color: var(--accent); }
  .grade-btn:hover { filter: brightness(0.96); }
  .nav-row {
    width: 100%; max-width: 760px; display: flex; justify-content: space-between;
    margin-top: 12px; gap: 8px;
  }
  .footer-note { margin-top: 22px; font-size: 0.72rem; color: var(--muted); text-align: center; }
  .done-banner {
    width: 100%; max-width: 760px; background: var(--accent-soft); color: var(--accent);
    border-radius: 14px; padding: 14px 18px; font-size: 0.9rem; font-weight: 600;
    margin-bottom: 12px; display: none;
  }
  @media (max-width: 520px) {
    .front-text.arabic { font-size: 2.1rem; }
    .front-text.english { font-size: 1.35rem; }
    .back-text.arabic { font-size: 1.7rem; }
    .flashcard { min-height: 280px; padding: 30px 18px; }
  }
</style>
</head>
<body>
<header>
  <h1>🇪🇬 Egyptian Arabic Practice</h1>
  <div class="controls">
    <button class="icon-btn" id="dirBtn" title="Switch question direction">AR → EN</button>
    <button class="icon-btn" id="themeBtn" title="Toggle theme">◐</button>
  </div>
</header>

<div class="decks" id="deckBar"></div>

<div class="done-banner" id="doneBanner"></div>

<div class="meta-row">
  <span id="counter">–</span>
  <div class="right">
    <button class="icon-btn" id="shuffleBtn">Shuffle</button>
    <button class="icon-btn" id="resetBtn">Reset deck progress</button>
  </div>
</div>

<div class="card-zone">
  <div class="flashcard" id="card">
    <span class="deck-label" id="deckLabel"></span>
    <button class="star" id="starBtn" title="Mark as hard">★</button>
    <div id="cardBody"></div>
  </div>
</div>

<div class="grade-row" id="gradeRow" style="visibility:hidden">
  <button class="grade-btn again" id="againBtn">Again &nbsp;(1)</button>
  <button class="grade-btn got" id="gotBtn">Got it &nbsp;(2)</button>
</div>

<div class="nav-row">
  <button class="icon-btn" id="prevBtn">← Prev</button>
  <button class="icon-btn" id="nextBtn">Skip →</button>
</div>

<p class="footer-note">Tap card or press Space to flip · 1 = again · 2 = got it · ← → to move<br>Progress saves automatically on this device.</p>

// ============ STATE ============
const LS_KEY = "arabicPracticeV1";
let state = { deck: "greet", dir: "ar2en", theme: null, hard: {}, done: {} };
try { Object.assign(state, JSON.parse(localStorage.getItem(LS_KEY) || "{}")); } catch(e) {}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

let order = [], idx = 0, flipped = false;

const $ = id => document.getElementById(id);
const cardKey = c => state.deck + "|" + c.ar;

function currentDeck() { return DECKS.find(d => d.id === state.deck) || DECKS[0]; }

function buildOrder(shuffle) {
  let cards;
  if (state.deck === "__hard") {
    cards = [];
    DECKS.forEach(d => d.cards.forEach(c => {
      if (state.hard[d.id + "|" + c.ar]) cards.push({...c, _deck: d.name, _key: d.id + "|" + c.ar});
    }));
  } else {
    const d = currentDeck();
    cards = d.cards.map(c => ({...c, _deck: d.name, _key: d.id + "|" + c.ar}));
  }
  // undone first, done after
  const undone = cards.filter(c => !state.done[c._key]);
  const done = cards.filter(c => state.done[c._key]);
  order = [...undone, ...done];
  if (shuffle) {
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
  }
  idx = 0; flipped = false;
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

function render() {
  // deck bar
  const bar = $("deckBar");
  bar.innerHTML = "";
  DECKS.forEach(d => {
    const b = document.createElement("button");
    b.className = "deck-chip" + (state.deck === d.id ? " active" : "");
    b.textContent = d.name;
    b.onclick = () => { state.deck = d.id; save(); buildOrder(false); render(); };
    bar.appendChild(b);
  });
  const hardCount = Object.keys(state.hard).filter(k => state.hard[k]).length;
  const hb = document.createElement("button");
  hb.className = "deck-chip" + (state.deck === "__hard" ? " active" : "");
  hb.textContent = "★ Hard (" + hardCount + ")";
  hb.onclick = () => { state.deck = "__hard"; save(); buildOrder(false); render(); };
  bar.appendChild(hb);

  $("dirBtn").textContent = state.dir === "ar2en" ? "AR → EN" : "EN → AR";

  const card = order[idx];
  const body = $("cardBody");
  const doneInDeck = order.filter(c => state.done[c._key]).length;

  const banner = $("doneBanner");
  if (order.length && doneInDeck === order.length) {
    banner.style.display = "block";
    banner.textContent = "🎉 Deck complete — every card marked \"got it\". Reset progress to run it again, or shuffle another deck.";
  } else banner.style.display = "none";

  if (!card) {
    $("deckLabel").textContent = "";
    $("starBtn").style.display = "none";
    $("gradeRow").style.visibility = "hidden";
    $("counter").textContent = "0 cards";
    body.innerHTML = '<div class="front-text english">No cards here yet.<br><span style="font-size:0.95rem;font-weight:400;color:var(--muted)">Mark cards with the ★ to collect your hard words.</span></div>';
    return;
  }

  $("starBtn").style.display = "";
  $("deckLabel").textContent = card._deck;
  $("counter").textContent = (idx + 1) + " / " + order.length + " · " + doneInDeck + " done";
  $("starBtn").className = "star" + (state.hard[card._key] ? " on" : "");

  const frontAr = state.dir === "ar2en";
  let html = frontAr
    ? '<div class="front-text arabic">' + esc(card.ar) + '</div>'
    : '<div class="front-text english">' + esc(card.en) + '</div>';
  if (flipped) {
    html += frontAr
      ? '<div class="back-text english">' + esc(card.en) + '</div>'
      : '<div class="back-text arabic">' + esc(card.ar) + '</div>';
    if (card.ex) {
      html += '<div class="example"><div class="arabic">' + esc(card.ex[0]) + '</div><div>' + esc(card.ex[1]) + '</div></div>';
    }
    if (card.t100) html += '<span class="top100-tag">top 100</span>';
  } else {
    html += '<div class="hint">tap to flip</div>';
  }
  body.innerHTML = html;
  $("gradeRow").style.visibility = flipped ? "visible" : "hidden";
}

function flip() { flipped = !flipped; render(); }
function next() { if (!order.length) return; idx = (idx + 1) % order.length; flipped = false; render(); }
function prev() { if (!order.length) return; idx = (idx - 1 + order.length) % order.length; flipped = false; render(); }
function grade(got) {
  const card = order[idx];
  if (!card) return;
  if (got) { state.done[card._key] = 1; }
  else {
    delete state.done[card._key];
    // re-queue a few cards later
    const c = order.splice(idx, 1)[0];
    const pos = Math.min(idx + 4, order.length);
    order.splice(pos, 0, c);
    idx = idx % order.length; flipped = false; save(); render(); return;
  }
  save(); next();
}

$("card").onclick = e => { if (e.target.id !== "starBtn") flip(); };
$("starBtn").onclick = () => {
  const card = order[idx]; if (!card) return;
  if (state.hard[card._key]) delete state.hard[card._key]; else state.hard[card._key] = 1;
  save(); render();
};
$("nextBtn").onclick = next;
$("prevBtn").onclick = prev;
$("againBtn").onclick = () => grade(false);
$("gotBtn").onclick = () => grade(true);
$("shuffleBtn").onclick = () => { buildOrder(true); render(); };
$("resetBtn").onclick = () => {
  order.forEach(c => delete state.done[c._key]);
  save(); buildOrder(false); render();
};
$("dirBtn").onclick = () => { state.dir = state.dir === "ar2en" ? "en2ar" : "ar2en"; flipped = false; save(); render(); };

function applyTheme() {
  const t = state.theme || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", t);
}
$("themeBtn").onclick = () => {
  const cur = document.documentElement.getAttribute("data-theme");
  state.theme = cur === "dark" ? "light" : "dark"; save(); applyTheme();
};

document.addEventListener("keydown", e => {
  if (e.code === "Space") { e.preventDefault(); flip(); }
  else if (e.key === "1" && flipped) grade(false);
  else if (e.key === "2" && flipped) grade(true);
  else if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft") prev();
});

applyTheme();
if (!DECKS.some(d => d.id === state.deck) && state.deck !== "__hard") state.deck = "greet";
buildOrder(false);
render();
</script>
