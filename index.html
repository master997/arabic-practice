<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egyptian Arabic Practice</title>
<style>
  :root {
    --bg: #f6f4ef;
    --card: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #0d7a5f;
    --accent-soft: #e0f0eb;
    --danger: #b4462e;
    --danger-soft: #f7e5df;
    --chip: #ece9e1;
    --chip-active: #1a1a1a;
    --chip-active-ink: #ffffff;
    --border: #e2ded4;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  [data-theme="dark"] {
    --bg: #14161a;
    --card: #1f2229;
    --ink: #eceae4;
    --muted: #9a9890;
    --accent: #4ecfa5;
    --accent-soft: #1d3830;
    --danger: #e0785c;
    --danger-soft: #3a231b;
    --chip: #2a2e37;
    --chip-active: #eceae4;
    --chip-active-ink: #14161a;
    --border: #30343d;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 16px; transition: background 0.25s, color 0.25s;
  }
  .arabic { font-family: "Geeza Pro", "Noto Naskh Arabic", "Traditional Arabic", serif; direction: rtl; }
  header {
    width: 100%; max-width: 760px; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 14px;
  }
  header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; }
  header .controls { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--chip); border: none; color: var(--ink); border-radius: 10px;
    padding: 7px 12px; font-size: 0.82rem; cursor: pointer; font-weight: 600;
  }
  .icon-btn:hover { opacity: 0.85; }
  .decks {
    width: 100%; max-width: 760px; display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .deck-chip {
    background: var(--chip); border: none; color: var(--ink); border-radius: 999px;
    padding: 7px 13px; font-size: 0.8rem; cursor: pointer; font-weight: 600;
    transition: background 0.15s;
  }
  .deck-chip.active { background: var(--chip-active); color: var(--chip-active-ink); }
  .meta-row {
    width: 100%; max-width: 760px; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px; font-size: 0.8rem; color: var(--muted);
  }
  .meta-row .right { display: flex; gap: 8px; align-items: center; }
  .card-zone { width: 100%; max-width: 760px; perspective: 1200px; }
  .flashcard {
    width: 100%; min-height: 320px; background: var(--card); border-radius: 20px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 36px 28px; cursor: pointer; position: relative;
    transition: transform 0.12s;
  }
  .flashcard:active { transform: scale(0.99); }
  .flashcard .deck-label {
    position: absolute; top: 16px; left: 20px; font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
  }
  .flashcard .star {
    position: absolute; top: 12px; right: 16px; font-size: 1.3rem; background: none;
    border: none; cursor: pointer; color: var(--muted); opacity: 0.45;
  }
  .flashcard .star.on { opacity: 1; color: #d9a406; }
  .front-text.arabic { font-size: 2.7rem; line-height: 1.7; }
  .front-text.english { font-size: 1.7rem; font-weight: 650; line-height: 1.4; }
  .back-text.arabic { font-size: 2.1rem; line-height: 1.7; margin-top: 18px; color: var(--accent); }
  .back-text.english { font-size: 1.25rem; font-weight: 600; margin-top: 18px; color: var(--accent); }
  #cardBody { width: 100%; }
  .pron {
    margin-top: 12px; font-size: 1.05rem; font-style: italic; color: var(--muted);
    line-height: 1.6; max-width: 92%; margin-left: auto; margin-right: auto;
  }
  .example {
    margin-top: 20px; padding-top: 16px; border-top: 1px dashed var(--border);
    font-size: 1.15rem; color: var(--muted); line-height: 1.8; max-width: 90%;
    margin-left: auto; margin-right: auto;
  }
  .example .arabic { font-size: 1.45rem; color: var(--ink); }
  .ex-row { padding: 3px 0; line-height: 1.9; }
  .ex-row span { white-space: nowrap; }
  .ex-row .arabic { unicode-bidi: isolate; }
  .ex-row .ex-pr { font-style: italic; font-size: 0.95rem; }
  .ex-row .sep { opacity: 0.45; margin: 0 6px; }
  .hint { margin-top: 22px; font-size: 0.75rem; color: var(--muted); }
  .top100-tag {
    display: inline-block; margin-top: 14px; font-size: 0.68rem; font-weight: 700;
    background: var(--accent-soft); color: var(--accent); padding: 3px 10px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .grade-row {
    width: 100%; max-width: 760px; display: flex; gap: 10px; margin-top: 14px;
  }
  .grade-btn {
    flex: 1; padding: 15px; border-radius: 14px; border: none; font-size: 0.95rem;
    font-weight: 700; cursor: pointer;
  }
  .grade-btn.again { background: var(--danger-soft); color: var(--danger); }
  .grade-btn.got { background: var(--accent-soft); color: var(--accent); }
  .grade-btn:hover { filter: brightness(0.96); }
  .nav-row {
    width: 100%; max-width: 760px; display: flex; justify-content: space-between;
    margin-top: 12px; gap: 8px;
  }
  .footer-note { margin-top: 22px; font-size: 0.72rem; color: var(--muted); text-align: center; }
  .done-banner {
    width: 100%; max-width: 760px; background: var(--accent-soft); color: var(--accent);
    border-radius: 14px; padding: 14px 18px; font-size: 0.9rem; font-weight: 600;
    margin-bottom: 12px; display: none;
  }
  @media (max-width: 520px) {
    .front-text.arabic { font-size: 2.1rem; }
    .front-text.english { font-size: 1.35rem; }
    .back-text.arabic { font-size: 1.7rem; }
    .flashcard { min-height: 280px; padding: 30px 18px; }
    .ex-row { padding: 7px 0; line-height: 1.5; }
    .ex-row span { display: block; white-space: normal; }
    .ex-row .sep { display: none; }
  }
</style>
</head>
<body>
<header>
  <h1>🇪🇬 Egyptian Arabic Practice</h1>
  <div class="controls">
    <button class="icon-btn" id="dirBtn" title="Switch question direction">AR → EN</button>
    <button class="icon-btn" id="themeBtn" title="Toggle theme">◐</button>
  </div>
</header>

<div class="decks" id="deckBar"></div>

<div class="done-banner" id="doneBanner"></div>

<div class="meta-row">
  <span id="counter">–</span>
  <div class="right">
    <button class="icon-btn" id="shuffleBtn">Shuffle</button>
    <button class="icon-btn" id="resetBtn">Reset deck progress</button>
  </div>
</div>

<div class="card-zone">
  <div class="flashcard" id="card">
    <span class="deck-label" id="deckLabel"></span>
    <button class="star" id="starBtn" title="Mark as hard">★</button>
    <div id="cardBody"></div>
  </div>
</div>

<div class="grade-row" id="gradeRow" style="visibility:hidden">
  <button class="grade-btn again" id="againBtn">Again &nbsp;(1)</button>
  <button class="grade-btn got" id="gotBtn">Got it &nbsp;(2)</button>
</div>

<div class="nav-row">
  <button class="icon-btn" id="prevBtn">← Prev</button>
  <button class="icon-btn" id="nextBtn">Skip →</button>
</div>

<p class="footer-note">Tap card or press Space to flip · 1 = again · 2 = got it · ← → to move<br>Pronunciation is Egyptian street-style: 3 = ع &nbsp;·&nbsp; ' = hamza or Egyptian ق &nbsp;·&nbsp; g = ج<br>Progress saves automatically on this device.</p>

{ id:"patterns", name:"Sentence patterns", cards:[
  {ar:"عايز + فعل", en:"I want to… (3ayez + verb)", pr:"3aayez atlob 'ahwa · 3aayez ashoofak · 3aayez atkallem 3arabi", ex:["عايز اطلب قهوة · عايز اشوفك · عايز اتكلم عربي","I want to order coffee · I want to see you · I want to speak Arabic"]},
  {ar:"عايزة + فعل", en:"I want to… (a woman speaking)", pr:"3ayza ashrab shaay", ex:["عايزة اشرب شاي","I want to drink tea"]},
  {ar:"ممكن + فعل؟", en:"Can / may…? (momken + verb)", pr:"momken tekarrar taani? · momken tetkallem be-raaha? · momken tekteb-ha?", ex:["ممكن تكرر تاني؟ · ممكن تتكلم براحة؟ · ممكن تكتبها؟","Can you repeat? · Can you speak slowly? · Can you write it?"]},
  {ar:"لازم + فعل", en:"I must… (lazem + verb)", pr:"laazem arooh delwa'ti · laazem adres · laazem akhallas esh-shoghl", ex:["لازم اروح دلوقتي · لازم ادرس · لازم اخلص الشغل","I must go now · I must study · I must finish work"]},
  {ar:"بحب + فعل", en:"I like to… (baheb + verb)", pr:"baheb atkallem be-sor3a · baheb el-'ahwa · baheb asaafer", ex:["بحب اتكلم بسرعة · بحب القهوة · بحب اسافر","I like to speak fast · I like coffee · I like to travel"]},
  {ar:"عندي / معنديش", en:"I have / I don't have", pr:"3andi so'aal · 3andi talateen sana · ma3andeesh wa't", ex:["عندي سؤال · عندي تلاتين سنة · معنديش وقت","I have a question · I'm 30 · I don't have time"]},
  {ar:"فيه / مفيش", en:"there is / there isn't", pr:"fee moshkela · mafeesh moshkela · mafeesh wa't", ex:["فيه مشكلة · مفيش مشكلة · مفيش وقت","There's a problem · No problem · There's no time"]},
  {ar:"انا بـ + فعل", en:"I do / am doing (bi- present)", pr:"ana bashtaghal · ana badres · ana baakol", ex:["انا بشتغل · انا بدرس · انا باكل","I work · I study · I'm eating"]},
  {ar:"انا هـ + فعل", en:"I will… (ha- future)", pr:"hakteb 3ala wara'a · hakhallas ba3d shwayya · harooh es-soo'", ex:["هكتب على ورقة · هخلص بعد شوية · هروح السوق","I'll write it down · I'll finish soon · I'll go to the market"]},
  {ar:"انا كنت …", en:"I was… (ana kont)", pr:"ana kont taaleb · kont fel-beit · kont ta3baan", ex:["انا كنت طالب · كنت في البيت · كنت تعبان","I was a student · I was at home · I was tired"]},
  {ar:"مش + …", en:"not… (mesh negates)", pr:"ana mesh faahem · mesh 3aaref · mesh met'akked", ex:["انا مش فاهم · مش عارف · مش متأكد","I don't understand · I don't know · I'm not sure"]},
  {ar:"محتاج + فعل", en:"I need to… (mehtag + verb)", pr:"mehtaag asaafer bokra · mehtaag mosa3da", ex:["محتاج اسافر بكرة · محتاج مساعدة","I need to travel tomorrow · I need help"]},
  {ar:"بفكر + فعل", en:"I'm thinking of… (bafakkar + verb)", pr:"bafakkar asaafer bel-leil · bafakkar arooh masr", ex:["بفكر اسافر بالليل · بفكر اروح مصر","Thinking of traveling at night · Thinking of going to Egypt"]},
  {ar:"نفسي + فعل", en:"I wish / dream to… (nefsi + verb)", pr:"nefsi ashtaghal mohandes · nefsi atkallem 3arabi kwayyes", ex:["نفسي اشتغل مهندس · نفسي اتكلم عربي كويس","I wish to work as an engineer · I wish to speak Arabic well"]},
  {ar:"تقدر + فعل؟", en:"Are you able to…? (te'dar + verb)", pr:"te'dar tesa3edni? · te'dar teegi bokra?", ex:["تقدر تساعدني؟ · تقدر تيجي بكرة؟","Can you help me? · Can you come tomorrow?"]},
  {ar:"يلا + فعل", en:"Let's… (yalla)", pr:"yalla nerooh · yalla naakol · yalla beena", ex:["يلا نروح · يلا ناكل · يلا بينا","Let's go · Let's eat · Let's get going"]},
]},

{ id:"questions", name:"Question drills", cards:[

{ id:"convoq", name:"Conversation questions", cards:[

  {ar:"عندك كم سنة؟", en:"How old are you?", pr:"3andak kam sana? — ana 3andi talateen sana", ex:["انا عندي تلاتين سنة","I'm thirty years old"]},

  {ar:"أنت نفسك تشتغل إيه؟", en:"What do you wish you worked as?", pr:"enta nefsak teshtaghal eih? — nefsi ashtaghal mohandes", ex:["نفسي اشتغل مهندس","I wish to work as an engineer"]},
  {ar:"أنت نفسك تروح فين؟", en:"Where do you wish you could go?", pr:"enta nefsak terooh fein? — nefsi arooh masr", ex:["نفسي اروح مصر","I wish to go to Egypt"]},
  {ar:"بتحب تسافر؟", en:"Do you like to travel?", pr:"betheb tesaafer? — aywa, baheb asaafer awi", ex:["ايوه، بحب اسافر اوي","Yes, I love to travel a lot"]},
  {ar:"أنت بتكره إيه؟", en:"What do you hate?", pr:"enta betekrah eih? — bakrah ez-zahma", ex:["بكره الزحمة","I hate crowds / traffic"]},
  {ar:"أنت عايز تعمل إيه لو سفرت مصر؟", en:"What do you want to do if you traveled to Egypt?", pr:"enta 3aayez te3mel eih law safert masr? — 3aayez ashoof el-ahraamaat we aakol akl masri", ex:["عايز اشوف الاهرامات و اكل اكل مصري","I want to see the pyramids and eat Egyptian food"]},
]},

{ id:"islands", name:"Conversation islands", cards:[
  {ar:"اهلا، انا اسمي محمد. انا من انجلترا و عندي تلاتين سنة. مبسوط اني اتكلم معاك.",
   en:"Hi, my name is Mohammed. I'm from England and I'm thirty. I'm happy to be talking with you.",
   pr:"ahlan, ana esmi Mohammed. ana men ingiltera we 3andi talateen sana. mabsoot enni atkallem ma3aak.",

   en:"I'm learning Egyptian Arabic. I only speak a little, but I understand more. If I don't understand, I'll tell you. Can you speak slowly please?",
   pr:"ana bat3allem 3arabi masri. batkallem shwayya bass, laaken bafham aktar. law mesh faahem, ha'ollak. momken tetkallem be-raaha law samaht?",
   ex:["Island 2 — My Arabic","Your safety net for the whole first lesson"]},
  {ar:"انا بشتغل في التكنولوجيا و بحب اتعلم حاجات جديدة. نفسي اتكلم عربي كويس عشان اتكلم مع ناس من مصر.",
   en:"I work in technology and I love learning new things. I wish to speak Arabic well so I can talk with people from Egypt.",

   ex:["Island 3 — Work & why","First conversations always land here — have it ready"]},
]},

{ id:"numbers", name:"Numbers, days, politeness", cards:[
  {ar:"واحد، اتنين، تلاتة، اربعة، خمسة", en:"1, 2, 3, 4, 5", pr:"waahed · etnein · talaata · arba3a · khamsa"},
  {ar:"ستة، سبعة، تمانية، تسعة، عشرة", en:"6, 7, 8, 9, 10", pr:"setta · sab3a · tamanya · tes3a · 3ashara"},
  {ar:"حداشر، اتناشر، تلاتاشر، اربعتاشر، خمستاشر", en:"11, 12, 13, 14, 15", pr:"hedaashar · etnaashar · talataashar · arba3taashar · khamastaashar"},
  {ar:"ستاشر، سبعتاشر، تمنتاشر، تسعتاشر، عشرين", en:"16, 17, 18, 19, 20", pr:"settaashar · saba3taashar · tamantaashar · tesa3taashar · 3eshreen"},
  {ar:"السبت", en:"Saturday", pr:"es-sabt"},
  {ar:"الحد", en:"Sunday", pr:"el-hadd"},
  {ar:"الاتنين", en:"Monday", pr:"el-etnein"},
  {ar:"التلات", en:"Tuesday", pr:"et-talaat"},
  {ar:"الاربع", en:"Wednesday", pr:"el-arba3"},
  {ar:"الخميس", en:"Thursday", pr:"el-khamees"},
  {ar:"الجمعة", en:"Friday", pr:"el-gom3a"},
  {ar:"لو سمحت", en:"please / excuse me", pr:"law samaht"},
  {ar:"شكرا", en:"thank you", pr:"shokran"},
  {ar:"عفوا", en:"you're welcome (Egyptians more often say العفو)", pr:"3afwan · el-3afw"},
  {ar:"بعد اذنك", en:"excuse me / with your permission", pr:"ba3d eznak"},
  {ar:"معلش", en:"never mind / sorry / it's okay", pr:"ma3lesh"},
  {ar:"ان شاء الله", en:"God willing / hopefully", pr:"in shaa' allah"},
  {ar:"الحمد لله", en:"thank God (also = I'm fine)", pr:"el-hamdu lellah"},
  {ar:"يلا", en:"come on / let's go", pr:"yalla"},
]},
];

// ============ STATE ============
const LS_KEY = "arabicPracticeV1";
let state = { deck: "greet", dir: "ar2en", theme: null, hard: {}, done: {} };
try { Object.assign(state, JSON.parse(localStorage.getItem(LS_KEY) || "{}")); } catch(e) {}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

let order = [], idx = 0, flipped = false;

const $ = id => document.getElementById(id);
const cardKey = c => state.deck + "|" + c.ar;

function currentDeck() { return DECKS.find(d => d.id === state.deck) || DECKS[0]; }

function buildOrder(shuffle) {
  let cards;
  if (state.deck === "__hard") {
    cards = [];
    DECKS.forEach(d => d.cards.forEach(c => {
      if (state.hard[d.id + "|" + c.ar]) cards.push({...c, _deck: d.name, _key: d.id + "|" + c.ar});
    }));
  } else {
    const d = currentDeck();
    cards = d.cards.map(c => ({...c, _deck: d.name, _key: d.id + "|" + c.ar}));
  }
  // undone first, done after
  const undone = cards.filter(c => !state.done[c._key]);
  const done = cards.filter(c => state.done[c._key]);
  order = [...undone, ...done];
  if (shuffle) {
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
  }
  idx = 0; flipped = false;
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

function render() {
  // deck bar
  const bar = $("deckBar");
  bar.innerHTML = "";
  DECKS.forEach(d => {
    const b = document.createElement("button");
    b.className = "deck-chip" + (state.deck === d.id ? " active" : "");
    b.textContent = d.name;
    b.onclick = () => { state.deck = d.id; save(); buildOrder(false); render(); };
    bar.appendChild(b);
  });
  const hardCount = Object.keys(state.hard).filter(k => state.hard[k]).length;
  const hb = document.createElement("button");
  hb.className = "deck-chip" + (state.deck === "__hard" ? " active" : "");
  hb.textContent = "★ Hard (" + hardCount + ")";
  hb.onclick = () => { state.deck = "__hard"; save(); buildOrder(false); render(); };
  bar.appendChild(hb);

  $("dirBtn").textContent = state.dir === "ar2en" ? "AR → EN" : "EN → AR";

  const card = order[idx];
  const body = $("cardBody");
  const doneInDeck = order.filter(c => state.done[c._key]).length;

  const banner = $("doneBanner");
  if (order.length && doneInDeck === order.length) {
    banner.style.display = "block";
    banner.textContent = "🎉 Deck complete — every card marked \"got it\". Reset progress to run it again, or shuffle another deck.";
  } else banner.style.display = "none";

  if (!card) {
    $("deckLabel").textContent = "";
    $("starBtn").style.display = "none";
    $("gradeRow").style.visibility = "hidden";
    $("counter").textContent = "0 cards";
    body.innerHTML = '<div class="front-text english">No cards here yet.<br><span style="font-size:0.95rem;font-weight:400;color:var(--muted)">Mark cards with the ★ to collect your hard words.</span></div>';
    return;
  }

  $("starBtn").style.display = "";
  $("deckLabel").textContent = card._deck;
  $("counter").textContent = (idx + 1) + " / " + order.length + " · " + doneInDeck + " done";
  $("starBtn").className = "star" + (state.hard[card._key] ? " on" : "");

  const frontAr = state.dir === "ar2en";
  let html = frontAr
    ? '<div class="front-text arabic">' + esc(card.ar) + '</div>'
    : '<div class="front-text english">' + esc(card.en) + '</div>';
  if (flipped) {
    // Comma-list cards (numbers: "واحد، اتنين…" vs "1, 2…") pair up item by item
    const listAr = card.ar.split("،").map(s => s.trim());
    const listEn = card.en.split(",").map(s => s.trim());
    const listPr = card.pr ? card.pr.split("·").map(s => s.trim()) : [];
    const listPaired = !card.ex && listAr.length > 1 &&
      listAr.length === listEn.length && listAr.length === listPr.length;
    if (!listPaired) {
      html += frontAr
        ? '<div class="back-text english">' + esc(card.en) + '</div>'
        : '<div class="back-text arabic">' + esc(card.ar) + '</div>';
    }
    // List cards ("… · … · …" or "…، …، …") get one row per item so each
    // translation sits next to its Arabic phrase instead of mirror-ordered (RTL vs LTR).
    const rows = (ars, prs, ens) => '<div class="example">' + ars.map((a, i) =>
      '<div class="ex-row"><span class="arabic">' + esc(a) + '</span><span class="sep">—</span>' +
      (prs ? '<span class="ex-pr">' + esc(prs[i]) + '</span><span class="sep">—</span>' : '') +
      '<span>' + esc(ens[i]) + '</span></div>').join('') + '</div>';
    const exAr = card.ex ? card.ex[0].split("·").map(s => s.trim()) : [];
    const exEn = card.ex ? card.ex[1].split("·").map(s => s.trim()) : [];
    const paired = exAr.length > 1 && exAr.length === exEn.length;
    // pron folds into the rows when it lists one part per example;
    // a "lead — part" first chunk (verb cards) keeps the lead as the pron line
    let exPr = null, prLead = card.pr || null;
    if (paired && card.pr) {
      const prParts = card.pr.split("·").map(s => s.trim());
      if (prParts.length === exAr.length) {
        const first = prParts[0].split("—").map(s => s.trim());
        if (first.length === 1) { exPr = prParts; prLead = null; }
        else if (first.length === 2) { exPr = [first[1], ...prParts.slice(1)]; prLead = first[0]; }
      }
    }
    // question+answer cards: pr is "question pronunciation — answer pronunciation".
    // Keep the question's half up top, move the answer's half down next to the answer
    // instead of lumping both together, far from the answer it belongs to.
    if (!paired && exAr.length === 1 && card.pr && card.pr.includes("—")) {
      const dash = card.pr.indexOf("—");
      prLead = card.pr.slice(0, dash).trim();
      exPr = [card.pr.slice(dash + 1).trim()];
    }
    if (listPaired) {
      html += rows(listAr, listPr, listEn);
    } else {
      if (prLead) html += '<div class="pron">' + esc(prLead) + '</div>';
      if (card.ex) {
        html += (paired || exPr)
          ? rows(exAr, exPr, exEn)
          : '<div class="example"><div class="arabic">' + esc(card.ex[0]) + '</div><div>' + esc(card.ex[1]) + '</div></div>';
      }
    }
    if (card.t100) html += '<span class="top100-tag">top 100</span>';
  } else {
    html += '<div class="hint">tap to flip</div>';
  }
  body.innerHTML = html;
  $("gradeRow").style.visibility = flipped ? "visible" : "hidden";
}

function flip() { flipped = !flipped; render(); }
function next() { if (!order.length) return; idx = (idx + 1) % order.length; flipped = false; render(); }
function prev() { if (!order.length) return; idx = (idx - 1 + order.length) % order.length; flipped = false; render(); }
function grade(got) {
  const card = order[idx];
  if (!card) return;
  if (got) { state.done[card._key] = 1; }
  else {
    delete state.done[card._key];
    // re-queue a few cards later
    const c = order.splice(idx, 1)[0];
    const pos = Math.min(idx + 4, order.length);
    order.splice(pos, 0, c);
    idx = idx % order.length; flipped = false; save(); render(); return;
  }
  save(); next();
}

$("card").onclick = e => { if (e.target.id !== "starBtn") flip(); };
$("starBtn").onclick = () => {
  const card = order[idx]; if (!card) return;
  if (state.hard[card._key]) delete state.hard[card._key]; else state.hard[card._key] = 1;
  save(); render();
};
$("nextBtn").onclick = next;
$("prevBtn").onclick = prev;
$("againBtn").onclick = () => grade(false);
$("gotBtn").onclick = () => grade(true);
$("shuffleBtn").onclick = () => { buildOrder(true); render(); };
$("resetBtn").onclick = () => {
  order.forEach(c => delete state.done[c._key]);
  save(); buildOrder(false); render();
};
$("dirBtn").onclick = () => { state.dir = state.dir === "ar2en" ? "en2ar" : "ar2en"; flipped = false; save(); render(); };

function applyTheme() {
  const t = state.theme || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", t);
}
$("themeBtn").onclick = () => {
  const cur = document.documentElement.getAttribute("data-theme");
  state.theme = cur === "dark" ? "light" : "dark"; save(); applyTheme();
};

document.addEventListener("keydown", e => {
  if (e.code === "Space") { e.preventDefault(); flip(); }
  else if (e.key === "1" && flipped) grade(false);
  else if (e.key === "2" && flipped) grade(true);
  else if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft") prev();
});

applyTheme();
if (!DECKS.some(d => d.id === state.deck) && state.deck !== "__hard") state.deck = "greet";
buildOrder(false);
render();
</script>
</body>
</html>
