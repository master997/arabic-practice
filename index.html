<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egyptian Arabic Practice</title>
<style>
  :root {
    /* One warm-dark theme: soft charcoal, warm off-white ink, a single muted amber accent. */
    --bg: #1c1b18;
    --card: #26241f;
    --ink: #ece7db;
    --muted: #a49c8b;
    --accent: #cf9b4e;
    --accent-soft: #342c1c;
    --danger: #cf7a5a;
    --danger-soft: #33241d;
    --chip: #2f2c26;
    --chip-active: #cf9b4e;
    --chip-active-ink: #1c1b18;
    --border: #38342c;
    --shadow: none;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 16px;
  }
  .arabic { font-family: "Geeza Pro", "Noto Naskh Arabic", "Traditional Arabic", serif; direction: rtl; }
  header {
    width: 100%; max-width: 760px; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 14px;
  }
  header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; }
  header .controls { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--chip); border: none; color: var(--ink); border-radius: 10px;
    padding: 7px 12px; font-size: 0.82rem; cursor: pointer; font-weight: 600;
  }
  .icon-btn:hover { opacity: 0.85; }
  .decks {
    width: 100%; max-width: 760px; display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .deck-chip {
    background: var(--chip); border: none; color: var(--ink); border-radius: 999px;
    padding: 7px 13px; font-size: 0.8rem; cursor: pointer; font-weight: 600;
    transition: background 0.15s;
  }
  .deck-chip.active { background: var(--chip-active); color: var(--chip-active-ink); }
  .meta-row {
    width: 100%; max-width: 760px; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px; font-size: 0.8rem; color: var(--muted);
  }
  .meta-row .right { display: flex; gap: 8px; align-items: center; }
  .card-zone { width: 100%; max-width: 760px; perspective: 1200px; }
  .flashcard {
    width: 100%; min-height: 320px; background: var(--card); border-radius: 20px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 36px 28px; cursor: pointer; position: relative;
    transition: transform 0.12s;
  }
  .flashcard:active { transform: scale(0.99); }
  .flashcard .deck-label {
    position: absolute; top: 16px; left: 20px; font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
  }
  .flashcard .star {
    position: absolute; top: 12px; right: 16px; font-size: 1.3rem; background: none;
    border: none; cursor: pointer; color: var(--muted); opacity: 0.45;
  }
  .flashcard .star.on { opacity: 1; color: #d9a406; }
  .front-text.arabic { font-size: 2.7rem; line-height: 1.7; }
  .front-text.english { font-size: 1.7rem; font-weight: 650; line-height: 1.4; }
  .back-text.arabic { font-size: 2.1rem; line-height: 1.7; margin-top: 18px; color: var(--accent); }
  .back-text.english { font-size: 1.25rem; font-weight: 600; margin-top: 18px; color: var(--accent); }
  #cardBody { width: 100%; }
  .pron {
    margin-top: 12px; font-size: 1.05rem; font-style: italic; color: var(--muted);
    line-height: 1.6; max-width: 92%; margin-left: auto; margin-right: auto;
  }
  .example {
    margin-top: 20px; padding-top: 16px; border-top: 1px dashed var(--border);
    font-size: 1.15rem; color: var(--muted); line-height: 1.8; max-width: 90%;
    margin-left: auto; margin-right: auto;
  }
  .example .arabic { font-size: 1.45rem; color: var(--ink); }
  .ex-row { padding: 3px 0; line-height: 1.9; }
  .ex-row span { white-space: nowrap; }
  .ex-row .arabic { unicode-bidi: isolate; }
  .ex-row .ex-pr { font-style: italic; font-size: 0.95rem; }
  .ex-row .sep { opacity: 0.45; margin: 0 6px; }
  .hint { margin-top: 22px; font-size: 0.75rem; color: var(--muted); }
  .top100-tag {
    display: inline-block; margin-top: 14px; font-size: 0.68rem; font-weight: 700;
    background: var(--accent-soft); color: var(--accent); padding: 3px 10px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .root-line {
    margin-top: 18px; padding-top: 14px; border-top: 1px dashed var(--border);
    font-size: 0.95rem; color: var(--muted); line-height: 1.9;
    max-width: 90%; margin-left: auto; margin-right: auto;
  }
  .root-line .root-label {
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; opacity: 0.75;
  }
  .root-line .root-letters { font-size: 1.3rem; color: var(--accent); letter-spacing: 0.15em; }
  .root-line .root-also .arabic { color: var(--ink); }
  .root-line .root-gloss { font-size: 0.82rem; opacity: 0.8; }
  .note {
    margin-top: 14px; padding: 10px 14px; background: var(--chip); border-radius: 12px;
    font-size: 0.9rem; color: var(--muted); line-height: 1.55; max-width: 90%;
    margin-left: auto; margin-right: auto; text-align: left;
  }
  .note .note-label {
    font-size: 0.64rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; opacity: 0.7; margin-right: 6px;
  }
  .chunk-tag {
    display: inline-block; margin-top: 14px; font-size: 0.72rem; font-weight: 650;
    color: var(--muted); background: var(--chip); padding: 4px 11px; border-radius: 999px;
  }
  .add-view { width: 100%; text-align: left; }
  .add-flash { padding: 12px 15px; background: var(--accent-soft); color: var(--accent); border-radius: 12px; font-weight: 650; font-size: 0.9rem; margin-bottom: 16px; white-space: pre-wrap; }
  .guide-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin: 26px 0 10px; }
  .guide-title:first-child, .add-flash + .guide-title { margin-top: 4px; }
  .guide-opt { color: var(--muted); font-weight: 600; text-transform: none; letter-spacing: 0; }
  .guide-steps { margin: 0 0 12px 1.1rem; padding: 0; }
  .guide-steps li { font-size: 1.05rem; line-height: 1.5; margin-bottom: 8px; }
  .guide-plain { font-size: 0.98rem; line-height: 1.6; color: var(--muted); margin-bottom: 12px; }
  .guide-plain b { color: var(--ink); }
  .guide-plain code { font-family: ui-monospace, Menlo, monospace; font-size: 0.88rem; background: var(--chip); color: var(--accent); padding: 2px 6px; border-radius: 6px; direction: ltr; unicode-bidi: isolate; }
  .browse-list { display: flex; flex-wrap: wrap; gap: 7px; }
  .browse-link { background: var(--chip); border: none; color: var(--ink); border-radius: 8px; padding: 7px 12px; font-size: 0.85rem; cursor: pointer; font-weight: 600; }
  .browse-link:hover { filter: brightness(1.15); }
  .add-box {
    width: 100%; min-height: 180px; border: 1px solid var(--border); border-radius: 14px;
    background: var(--bg); color: var(--ink); padding: 14px; font-size: 1.05rem; line-height: 1.7;
    font-family: inherit; resize: vertical; direction: rtl; text-align: right;
  }
  .add-box:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .add-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .add-note { margin-top: 16px; font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
  .today { width: 100%; text-align: left; }
  .today-head { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .today-title { font-size: 1.3rem; font-weight: 750; margin: 4px 0 6px; letter-spacing: -0.01em; }
  .today-done { margin: 10px 0 4px; padding: 14px 16px; background: var(--accent-soft); color: var(--accent); border-radius: 14px; font-weight: 700; text-align: center; }
  .step { display: flex; gap: 14px; align-items: flex-start; padding: 18px 0; border-top: 1px dashed var(--border); }
  .step-num {
    flex: 0 0 30px; height: 30px; width: 30px; border-radius: 999px; background: var(--chip);
    color: var(--ink); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;
  }
  .step.done .step-num { background: var(--accent); color: #fff; }
  .step-main { flex: 1; min-width: 0; }
  .step-name { font-weight: 700; font-size: 1.05rem; margin-bottom: 4px; }
  .step.done .step-name { color: var(--muted); }
  .step-sub { font-size: 0.9rem; color: var(--muted); line-height: 1.55; }
  .step-sub b { color: var(--ink); font-weight: 700; }
  .step-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .step-btn {
    background: var(--accent-soft); color: var(--accent); border: none; border-radius: 11px;
    padding: 10px 15px; font-weight: 700; font-size: 0.85rem; cursor: pointer;
  }
  .step-btn.ghost { background: var(--chip); color: var(--ink); }
  .step-btn:hover { filter: brightness(0.96); }
  .streak-wrap { margin-top: 22px; padding-top: 18px; border-top: 1px dashed var(--border); }
  .streak-top { display: flex; align-items: baseline; gap: 9px; margin-bottom: 13px; }
  .streak-num { font-size: 1.55rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .streak-lbl { font-size: 0.92rem; color: var(--muted); font-weight: 650; }
  .streak-best { margin-left: auto; font-size: 0.76rem; color: var(--muted); }
  .heatmap-wrap { overflow-x: auto; padding-bottom: 2px; }
  .heatmap { display: grid; grid-auto-flow: column; grid-auto-columns: 13px; grid-template-rows: repeat(7, 13px); gap: 3px; }
  .hm-cell { border-radius: 3px; background: var(--accent); }
  .hm-cell.l0 { background: var(--chip); }
  .hm-cell.l1 { opacity: 0.4; }
  .hm-cell.l2 { opacity: 0.68; }
  .hm-cell.l3 { opacity: 1; }
  .hm-cell.future { background: transparent; }
  .heatmap-legend { display: flex; align-items: center; gap: 5px; justify-content: flex-end; margin-top: 8px; font-size: 0.7rem; color: var(--muted); }
  .heatmap-legend .hm-cell { width: 11px; height: 11px; }
  .grade-row {
    width: 100%; max-width: 760px; display: flex; gap: 10px; margin-top: 14px;
  }
  .grade-btn {
    flex: 1; padding: 15px; border-radius: 14px; border: none; font-size: 0.95rem;
    font-weight: 700; cursor: pointer;
  }
  .grade-btn.again { background: var(--danger-soft); color: var(--danger); }
  .grade-btn.got { background: var(--accent-soft); color: var(--accent); }
  .grade-btn:hover { filter: brightness(0.96); }
  .nav-row {
    width: 100%; max-width: 760px; display: flex; justify-content: space-between;
    margin-top: 12px; gap: 8px;
  }
  .footer-note { margin-top: 22px; font-size: 0.72rem; color: var(--muted); text-align: center; }
  .done-banner {
    width: 100%; max-width: 760px; background: var(--accent-soft); color: var(--accent);
    border-radius: 14px; padding: 14px 18px; font-size: 0.9rem; font-weight: 600;
    margin-bottom: 12px; display: none;
  }
  @media (max-width: 520px) {
    .front-text.arabic { font-size: 2.1rem; }
    .front-text.english { font-size: 1.35rem; }
    .back-text.arabic { font-size: 1.7rem; }
    .flashcard { min-height: 280px; padding: 30px 18px; }
    .ex-row { padding: 7px 0; line-height: 1.5; }
    .ex-row span { display: block; white-space: normal; }
    .ex-row .sep { display: none; }
  }
</style>
</head>
<body>
<header>
  <h1>Egyptian Arabic</h1>
  <div class="controls">
    <button class="icon-btn" id="dirBtn" title="Switch question direction">AR → EN</button>
  </div>
</header>

<div class="decks" id="deckBar"></div>

<div class="done-banner" id="doneBanner"></div>

<div class="meta-row">
  <span id="counter">–</span>
  <div class="right">
    <button class="icon-btn" id="shuffleBtn">Shuffle</button>
  </div>
</div>

<div class="card-zone">
  <div class="flashcard" id="card">
    <span class="deck-label" id="deckLabel"></span>
    <button class="star" id="starBtn" title="Mark as hard">★</button>
    <div id="cardBody"></div>
  </div>
</div>

<div class="grade-row" id="gradeRow" style="visibility:hidden">
  <button class="grade-btn again" id="againBtn">Again &nbsp;(1)</button>
  <button class="grade-btn got" id="gotBtn">Got it &nbsp;(2)</button>
</div>

<div class="nav-row">
  <button class="icon-btn" id="prevBtn">← Prev</button>
  <button class="icon-btn" id="nextBtn">Skip →</button>
</div>

<p class="footer-note">Tap card or press Space to flip · 1 = again · 2 = got it · ← → to move<br>Pronunciation is Egyptian: 3 = ع &nbsp;·&nbsp; ' = hamza or Egyptian ق &nbsp;·&nbsp; g = ج<br>New here? Open <b>What to do</b>. Progress saves on this device.</p>

<script>
// ============ DATA ============
// Card schema (only ar + en are required; everything else is optional and is

//   pr   Egyptian pronunciation    (3=ع, '=hamza/ق, g=ج)
//   ex   [arabicExample, englishExample]
//   root three spaced letters      e.g. "ر و ح"
//   note usage note / disambiguation (kept out of en/pr so those stay clean)
//   t100 flag: also in the top-100
//   kind "word" | "phrase"         (auto-derived at load if absent)
//   id/tags/deck/src/added are assigned automatically at load — do not hand-write.
// Seed card ORDER within a deck is its stable identity — append new cards at the
// end; never reorder or delete a card mid-deck or its review history shifts.
const DECKS = [

{ id:"patterns", name:"Sentence patterns", cards:[
  {ar:"عايز + فعل", en:"I want to… (3ayez + verb)", pr:"3aayez atlob 'ahwa · 3aayez ashoofak · 3aayez atkallem 3arabi", ex:["عايز اطلب قهوة · عايز اشوفك · عايز اتكلم عربي","I want to order coffee · I want to see you · I want to speak Arabic"]},
  {ar:"عايزة + فعل", en:"I want to… (a woman speaking)", pr:"3ayza ashrab shaay", ex:["عايزة اشرب شاي","I want to drink tea"]},
  {ar:"ممكن + فعل؟", en:"Can / may…? (momken + verb)", pr:"momken tekarrar taani? · momken tetkallem be-raaha? · momken tekteb-ha?", ex:["ممكن تكرر تاني؟ · ممكن تتكلم براحة؟ · ممكن تكتبها؟","Can you repeat? · Can you speak slowly? · Can you write it?"]},
  {ar:"لازم + فعل", en:"I must… (lazem + verb)", pr:"laazem arooh delwa'ti · laazem adres · laazem akhallas esh-shoghl", ex:["لازم اروح دلوقتي · لازم ادرس · لازم اخلص الشغل","I must go now · I must study · I must finish work"]},
  {ar:"بحب + فعل", en:"I like to… (baheb + verb)", pr:"baheb atkallem be-sor3a · baheb el-'ahwa · baheb asaafer", ex:["بحب اتكلم بسرعة · بحب القهوة · بحب اسافر","I like to speak fast · I like coffee · I like to travel"]},
  {ar:"عندي / معنديش", en:"I have / I don't have", pr:"3andi so'aal · 3andi talateen sana · ma3andeesh wa't", ex:["عندي سؤال · عندي تلاتين سنة · معنديش وقت","I have a question · I'm 30 · I don't have time"]},
  {ar:"فيه / مفيش", en:"there is / there isn't", pr:"fee moshkela · mafeesh moshkela · mafeesh wa't", ex:["فيه مشكلة · مفيش مشكلة · مفيش وقت","There's a problem · No problem · There's no time"]},
  {ar:"انا بـ + فعل", en:"I do / am doing (bi- present)", pr:"ana bashtaghal · ana badres · ana baakol", ex:["انا بشتغل · انا بدرس · انا باكل","I work · I study · I'm eating"]},
  {ar:"انا هـ + فعل", en:"I will… (ha- future)", pr:"hakteb 3ala wara'a · hakhallas ba3d shwayya · harooh es-soo'", ex:["هكتب على ورقة · هخلص بعد شوية · هروح السوق","I'll write it down · I'll finish soon · I'll go to the market"]},
  {ar:"انا كنت …", en:"I was… (ana kont)", pr:"ana kont taaleb · kont fel-beit · kont ta3baan", ex:["انا كنت طالب · كنت في البيت · كنت تعبان","I was a student · I was at home · I was tired"]},
  {ar:"مش + …", en:"not… (mesh negates)", pr:"ana mesh faahem · mesh 3aaref · mesh met'akked", ex:["انا مش فاهم · مش عارف · مش متأكد","I don't understand · I don't know · I'm not sure"]},
  {ar:"محتاج + فعل", en:"I need to… (mehtag + verb)", pr:"mehtaag asaafer bokra · mehtaag mosa3da", ex:["محتاج اسافر بكرة · محتاج مساعدة","I need to travel tomorrow · I need help"]},
  {ar:"بفكر + فعل", en:"I'm thinking of… (bafakkar + verb)", pr:"bafakkar asaafer bel-leil · bafakkar arooh masr", ex:["بفكر اسافر بالليل · بفكر اروح مصر","Thinking of traveling at night · Thinking of going to Egypt"]},
  {ar:"نفسي + فعل", en:"I wish / dream to… (nefsi + verb)", pr:"nefsi ashtaghal mohandes · nefsi atkallem 3arabi kwayyes", ex:["نفسي اشتغل مهندس · نفسي اتكلم عربي كويس","I wish to work as an engineer · I wish to speak Arabic well"]},
  {ar:"تقدر + فعل؟", en:"Are you able to…? (te'dar + verb)", pr:"te'dar tesa3edni? · te'dar teegi bokra?", ex:["تقدر تساعدني؟ · تقدر تيجي بكرة؟","Can you help me? · Can you come tomorrow?"]},
  {ar:"يلا + فعل", en:"Let's… (yalla)", pr:"yalla nerooh · yalla naakol · yalla beena", ex:["يلا نروح · يلا ناكل · يلا بينا","Let's go · Let's eat · Let's get going"]},
]},

  {ar:"احب", en:"to like / love", pr:"aheb — baheb · betheb · haheb", root:"ح ب ب", ex:["انا بحب · انت بتحب · هحب","I like · you like · I will like"]},
  {ar:"اشتغل", en:"to work", pr:"ashtaghal — bashtaghal · beteshtaghal · hashtaghal", root:"ش غ ل", ex:["انا بشتغل · انت بتشتغل · هشتغل","I work · you work · I will work"]},

  {ar:"اسمع", en:"to hear / listen", pr:"asma3 — basma3 · betesma3 · hasma3", root:"س م ع", ex:["انا بسمع · انت بتسمع · هسمع","I hear · you hear · I will hear"]},

// My words — Claude appends inbox-enriched cards here (see inbox.md / CLAUDE.md).
// Keep it last. In-app "What to do" quick-adds merge into this same deck from localStorage.
{ id:"mine", name:"My words", cards:[
]},
];

// ============ STATE ============
const LS_KEY = "arabicPracticeV1";
const DAY = 86400000, MIN = 60000;
const DAILY_NEW = 8;
let state = { deck: "__today", dir: "ar2en", theme: null, hard: {}, sched: {}, today: null, history: {}, userCards: [] };
try { Object.assign(state, JSON.parse(localStorage.getItem(LS_KEY) || "{}")); } catch(e) {}
if (!state.sched) state.sched = {};
if (!Array.isArray(state.userCards)) state.userCards = [];
// migrate legacy binary "done" → treat as known once, due tomorrow
if (state.done) {
  for (const k in state.done) if (state.done[k] && !state.sched[k]) state.sched[k] = { box: 1, due: Date.now() + DAY };
  delete state.done;
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

// ============ SPACED REPETITION (FSRS) ============
// Compact FSRS-5 with the published default weights (no per-user training). Each
// card stores { s: stability(days), d: difficulty(1–10), due, reps, lapses, st,
// last }. `st` is "lrn" (a same-session step, mirroring the old 10-min behaviour)
// or "rev" (graduated, FSRS-scheduled). Grades: Again=1, Got it=3.
const W = [0.40255, 1.18385, 3.173, 15.69105, 7.1949, 0.5345, 1.4604, 0.0046,
  1.54575, 0.1192, 1.01925, 1.9395, 0.11, 0.29605, 2.2698, 0.2315, 2.9898, 0.51655, 0.6621];
const DECAY = -0.5;
const FACTOR = Math.pow(0.9, 1 / DECAY) - 1;
const RETENTION = 0.9;
const LEARN_STEP = 10 * MIN; // same-session return for new / lapsed cards
const clampD = d => Math.min(10, Math.max(1, d));
function initS(g) { return W[g - 1]; }
function initD(g) { return clampD(W[4] - Math.exp(W[5] * (g - 1)) + 1); }
const retrievability = (t, s) => Math.pow(1 + FACTOR * t / s, DECAY);
function intervalDays(s) {
  return Math.max(1, Math.round((s / FACTOR) * (Math.pow(RETENTION, 1 / DECAY) - 1)));
}
function nextD(d, g) {
  const dd = d - W[6] * (g - 3) * (10 - d) / 9;      // linear damping
  return clampD(W[7] * initD(4) + (1 - W[7]) * dd);   // mean reversion
}
function recallS(d, s, r, g) {
  const hard = g === 2 ? W[15] : 1, easy = g === 4 ? W[16] : 1;
  return s * (1 + Math.exp(W[8]) * (11 - d) * Math.pow(s, -W[9]) *
    (Math.exp(W[10] * (1 - r)) - 1) * hard * easy);
}
function lapseS(d, s, r) {
  return Math.min(s, W[11] * Math.pow(d, -W[12]) *
    (Math.pow(s + 1, W[13]) - 1) * Math.exp(W[14] * (1 - r)));
}
// Advance a card's memory state by one grade and persist its next due time.
function schedule(key, g) {
  const now = Date.now();
  let e = state.sched[key];
  if (!e) {                                     // brand-new card, first exposure
    e = { s: initS(g), d: initD(g), reps: 0, lapses: 0, st: "lrn", last: now };
    e.due = g === 1 ? now + MIN : now + LEARN_STEP;
  } else if (e.st === "lrn") {
    if (g === 1) { e.due = now + MIN; }         // stay in the same-session step
    else { e.st = "rev"; e.reps++; e.last = now; e.due = now + intervalDays(e.s) * DAY; }
  } else {                                       // graduated review
    const t = Math.max(0, (now - (e.last || now)) / DAY);
    const r = retrievability(t, e.s);
    e.d = nextD(e.d, g);
    if (g === 1) { e.lapses++; e.s = lapseS(e.d, e.s, r); e.st = "lrn"; e.due = now + LEARN_STEP; }
    else { e.s = recallS(e.d, e.s, r, g); e.due = now + intervalDays(e.s) * DAY; }
    e.reps++; e.last = now;
  }
  state.sched[key] = e;
}

// ---- normalize: assign stable ids/kind/tags, merge user cards into DECKS ----
// A card's identity is its `id` (not its Arabic text), so cleaning/re-tagging or
// editing a card never orphans its review history. `kind`/`tags` are derived so
// the seed data stays terse — Claude only has to write ar/en/pr/ex/root/note.
const guessKind = ar => (ar.trim().split(/\s+/).length >= 3 ? "phrase" : "word");
function normalizeCard(c, deck, i, src) {
  if (!c.id) c.id = src === "seed" ? deck.id + "-" + i : (c.id || "u-" + i);
  c.deck = deck.id;
  c.src = c.src || src;
  if (!c.kind) c.kind = guessKind(c.ar);
  const tags = new Set(c.tags || []);
  tags.add(deck.id);
  if (c.t100) tags.add("top-100");
  if (src === "seed") tags.add("seed");
  // Only user-captured words are "stubs" awaiting Claude enrichment — seed cards
  // legitimately lack examples/roots and must never be flagged.
  else if (!c.pr || !c.ex || !c.root) tags.add("needs-enrichment");
  c.tags = [...tags];
  return c;
}
function normalize() {
  DECKS.forEach(d => d.cards.forEach((c, i) => normalizeCard(c, d, i, "seed")));
  // Merge in-app quick-adds (localStorage) into the My words deck. Once Claude
  // has enriched a word into the file from the inbox, a seed card with that Arabic
  // exists, so the localStorage stub is suppressed — and its review history is
  // transferred to the enriched card so nothing is lost across the upgrade.
  const mine = DECKS.find(d => d.id === "mine");
  const arToId = {};
  DECKS.forEach(d => d.cards.forEach(c => { if (!(c.ar.trim() in arToId)) arToId[c.ar.trim()] = c.id; }));
  state.userCards.forEach((c, i) => {
    const ar = c.ar.trim(), stubId = c.id || "u-" + i;
    if (ar in arToId) {
      const seedId = arToId[ar];
      if (state.sched[stubId] && !state.sched[seedId]) state.sched[seedId] = state.sched[stubId];
      if (state.hard[stubId] && !state.hard[seedId]) state.hard[seedId] = state.hard[stubId];
      return;
    }
    arToId[ar] = stubId;
    mine.cards.push(normalizeCard({ ...c, id: stubId }, mine, i, c.src || "tutor"));
  });
}
normalize();

// One-time: re-key ar-based schedule/hard entries onto stable card ids, and
// convert the old Leitner {box,due} entries to FSRS memory states. Unmatched
// keys are kept, never dropped.
if (!state.keyed) {
  const arToId = {};
  DECKS.forEach(d => d.cards.forEach(c => { arToId[d.id + "|" + c.ar] = c.id; }));
  const rekey = obj => {
    const out = {};
    for (const k in obj) out[arToId[k] || k] = obj[k];
    return out;
  };
  state.sched = rekey(state.sched || {});
  state.hard = rekey(state.hard || {});
  const boxDays = [10 / 1440, 1, 3, 7, 16, 35];
  for (const k in state.sched) {
    const s = state.sched[k];
    if (s && s.box !== undefined && s.s === undefined) {
      if (s.box <= 1) state.sched[k] = { s: initS(3), d: initD(3), due: s.due, reps: s.box, lapses: 0, st: "lrn", last: Date.now() };
      else state.sched[k] = { s: boxDays[Math.min(s.box, 6) - 1], d: 5, due: s.due, reps: s.box, lapses: 0, st: "rev", last: Date.now() };
    }
  }
  state.keyed = true;
  save();
}

// ---- daily plan + streak ----
const ymdOf = d => d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
const localDayStr = () => ymdOf(new Date());
// Fresh per-day record; resets counters when the calendar day rolls over.
function ensureToday() {
  if (!state.today || state.today.date !== localDayStr())
    state.today = { date: localDayStr(), newDone: 0, checks: {} };
  if (!state.history) state.history = {};
}
// Focus deck auto-rotates one deck per day, looping through every deck.
function todaysFocus() {
  const n = Math.floor((Date.now() - new Date().getTimezoneOffset() * MIN) / DAY);
  return DECKS[n % DECKS.length];
}
// Steps done today (0–3): reviews cleared, new-card quota met, said aloud.
function computeDoneN() {
  ensureToday();
  let due = 0;
  DECKS.forEach(d => d.cards.forEach(c => { if (isReviewDue(c.id)) due++; }));
  return (due === 0 ? 1 : 0) + (state.today.newDone >= DAILY_NEW ? 1 : 0) + (state.today.checks.speak ? 1 : 0);
}
// Stamp today's best progress into history for the streak grid (monotonic).
function recordToday() {
  ensureToday();
  const n = computeDoneN();
  if (n > (state.history[state.today.date] || 0)) state.history[state.today.date] = n;
}
function streakInfo() {
  const set = new Set(Object.keys(state.history || {}).filter(k => state.history[k] >= 3));
  let cur = 0;
  const t = new Date(); t.setHours(0, 0, 0, 0);
  if (!set.has(ymdOf(t))) t.setDate(t.getDate() - 1);
  while (set.has(ymdOf(t))) { cur++; t.setDate(t.getDate() - 1); }
  let best = 0;
  for (const k of set) {
    const [y, m, d] = k.split("-").map(Number);
    const prev = new Date(y, m - 1, d); prev.setDate(prev.getDate() - 1);
    if (set.has(ymdOf(prev))) continue; // not the start of a run
    let len = 0, run = new Date(y, m - 1, d);
    while (set.has(ymdOf(run))) { len++; run.setDate(run.getDate() + 1); }
    if (len > best) best = len;
  }
  return { cur, best };
}
// 14-week GitHub-style grid, Sunday-aligned columns, shaded by steps done.
function heatmapHtml() {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const start = new Date(today); start.setDate(start.getDate() - (14 * 7 - 1));
  start.setDate(start.getDate() - start.getDay());
  const last = new Date(today); last.setDate(last.getDate() + (6 - last.getDay()));
  let cells = "";
  for (const cur = new Date(start); cur <= last; cur.setDate(cur.getDate() + 1)) {
    if (cur > today) { cells += '<div class="hm-cell future"></div>'; continue; }
    cells += '<div class="hm-cell l' + (state.history[ymdOf(cur)] || 0) + '"></div>';
  }
  return '<div class="heatmap-wrap"><div class="heatmap">' + cells + "</div></div>";
}
// Jump to a deck (optionally forcing a direction) from a Today button.
function goDeck(id, dir) {
  if (dir) state.dir = dir;
  state.deck = id; flipped = false; save(); buildOrder(false); render();
}

// ---- due-state helpers (scheduling itself lives in the FSRS engine above) ----
const isDue = key => { const s = state.sched[key]; return !s || s.due <= Date.now(); };
const isReviewDue = key => { const s = state.sched[key]; return s && s.due <= Date.now(); };
function nextDueAmong(keys) {
  let m = Infinity;
  for (const k of keys) { const s = state.sched[k]; if (s && s.due > Date.now() && s.due < m) m = s.due; }
  return m === Infinity ? null : m;
}
function relTime(ms) {
  const d = ms - Date.now();
  if (d <= 0) return "now";
  if (d < 3600000) return "in " + Math.max(1, Math.round(d / 60000)) + " min";
  if (d < DAY) return "in " + Math.round(d / 3600000) + " h";
  const days = Math.round(d / DAY);
  return days === 1 ? "tomorrow" : "in " + days + " days";
}

let order = [], idx = 0, flipped = false;

const $ = id => document.getElementById(id);

function currentDeck() { return DECKS.find(d => d.id === state.deck) || DECKS[0]; }

// Words sharing a 3-letter root, indexed for the "same family" line on flip.
const ROOT_INDEX = (() => {
  const m = {};
  for (const d of DECKS) for (const c of d.cards) {
    if (c.root) (m[c.root] = m[c.root] || []).push({ ar: c.ar, en: c.en, pr: c.pr });
  }
  return m;
})();
// First gloss only ("to see — I see" → "to see", "knowing (I know)" → "knowing")
const shortGloss = en => en.split(/[—(/,]/)[0].trim();

// Every card the current view could draw from, tagged with deck + stable key.
function candidateCards() {
  if (state.deck === "__today" || state.deck === "__guide") return [];
  if (state.deck === "__hard") {
    const out = [];
    DECKS.forEach(d => d.cards.forEach(c => {
      if (state.hard[c.id]) out.push({...c, _deck: d.name, _key: c.id});
    }));
    return out;
  }
  if (state.deck === "__due") {
    const out = [];
    DECKS.forEach(d => d.cards.forEach(c => out.push({...c, _deck: d.name, _key: c.id})));
    return out;
  }
  const d = currentDeck();
  return d.cards.map(c => ({...c, _deck: d.name, _key: c.id}));
}

function buildOrder(shuffle) {
  // ⏰ Due is the only schedule-gated view (returning reviews only). Every other
  // deck stays fully browsable — you can always flip through all its cards.
  order = state.deck === "__due"
    ? candidateCards().filter(c => isReviewDue(c._key))
    : candidateCards();
  // new cards first, then overdue, then cards scheduled further out
  order.sort((a, b) =>
    ((state.sched[a._key] && state.sched[a._key].due) || 0) -
    ((state.sched[b._key] && state.sched[b._key].due) || 0));
  if (shuffle) {
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
  }
  idx = 0; flipped = false;
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

function render() {
  // Minimal top bar — four calm buttons. Topic decks stay reachable through Today
  // (the daily focus rotates through them) and the "What to do" tab's browse list.
  const bar = $("deckBar");
  bar.innerHTML = "";
  let dueCount = 0;
  DECKS.forEach(d => d.cards.forEach(c => { if (isReviewDue(c.id)) dueCount++; }));
  const hardCount = Object.keys(state.hard).filter(k => state.hard[k]).length;
  const chip = (id, label, go) => {
    const b = document.createElement("button");
    b.className = "deck-chip" + (state.deck === id ? " active" : "");
    b.textContent = label;
    b.onclick = go;
    bar.appendChild(b);
  };
  chip("__today", "Today", () => { state.deck = "__today"; save(); buildOrder(false); render(); });
  chip("__due", "Reviews (" + dueCount + ")", () => { state.deck = "__due"; save(); buildOrder(false); render(); });
  chip("__hard", "Hard (" + hardCount + ")", () => { state.deck = "__hard"; save(); buildOrder(false); render(); });
  chip("__guide", "What to do", () => { state.deck = "__guide"; save(); render(); });

  $("dirBtn").textContent = state.dir === "ar2en" ? "AR → EN" : "EN → AR";

  if (state.deck === "__today") { renderToday(); return; }
  if (state.deck === "__guide") { renderGuide(); return; }

  const card = order[idx];
  const body = $("cardBody");
  $("doneBanner").style.display = "none";

  if (!card) {
    $("deckLabel").textContent = "";
    $("starBtn").style.display = "none";
    $("gradeRow").style.visibility = "hidden";
    $("counter").textContent = "";
    const sub = t => '<br><span style="font-size:0.95rem;font-weight:400;color:var(--muted)">' + t + '</span>';
    let msg;
    if (state.deck === "__hard") {
      msg = "No hard cards yet." + sub("Tap the ★ on any card to collect your tricky words here.");
    } else if (state.deck === "__due") {
      msg = "Nothing due right now." + sub("Reviews come back on schedule — open Today to learn new cards.");
    } else {
      const nxt = nextDueAmong(candidateCards().map(c => c._key));
      msg = "All caught up in this deck." +
        sub(nxt ? "Next card comes back " + relTime(nxt) + "." : "Star cards for the Hard set, or try another deck.");
    }
    body.innerHTML = '<div class="front-text english">' + msg + '</div>';
    return;
  }

  $("starBtn").style.display = "";
  $("deckLabel").textContent = card._deck;
  $("counter").textContent = (idx + 1) + " / " + order.length + (state.deck === "__due" ? " due" : "");
  $("starBtn").className = "star" + (state.hard[card._key] ? " on" : "");

  const frontAr = state.dir === "ar2en";
  let html = frontAr
    ? '<div class="front-text arabic">' + esc(card.ar) + '</div>'
    : '<div class="front-text english">' + esc(card.en) + '</div>';
  if (flipped) {
    // Comma-list cards (numbers: "واحد، اتنين…" vs "1, 2…") pair up item by item
    const listAr = card.ar.split("،").map(s => s.trim());
    const listEn = card.en.split(",").map(s => s.trim());
    const listPr = card.pr ? card.pr.split("·").map(s => s.trim()) : [];
    const listPaired = !card.ex && listAr.length > 1 &&
      listAr.length === listEn.length && listAr.length === listPr.length;
    if (!listPaired) {
      html += frontAr
        ? '<div class="back-text english">' + esc(card.en) + '</div>'
        : '<div class="back-text arabic">' + esc(card.ar) + '</div>';
    }
    // List cards ("… · … · …" or "…، …، …") get one row per item so each
    // translation sits next to its Arabic phrase instead of mirror-ordered (RTL vs LTR).
    const rows = (ars, prs, ens) => '<div class="example">' + ars.map((a, i) =>
      '<div class="ex-row"><span class="arabic">' + esc(a) + '</span><span class="sep">—</span>' +
      (prs ? '<span class="ex-pr">' + esc(prs[i]) + '</span><span class="sep">—</span>' : '') +
      '<span>' + esc(ens[i]) + '</span></div>').join('') + '</div>';
    const exAr = card.ex ? card.ex[0].split("·").map(s => s.trim()) : [];
    const exEn = card.ex ? card.ex[1].split("·").map(s => s.trim()) : [];
    const paired = exAr.length > 1 && exAr.length === exEn.length;
    // pron folds into the rows when it lists one part per example;
    // a "lead — part" first chunk (verb cards) keeps the lead as the pron line
    let exPr = null, prLead = card.pr || null;
    if (paired && card.pr) {
      const prParts = card.pr.split("·").map(s => s.trim());
      if (prParts.length === exAr.length) {
        const first = prParts[0].split("—").map(s => s.trim());
        if (first.length === 1) { exPr = prParts; prLead = null; }
        else if (first.length === 2) { exPr = [first[1], ...prParts.slice(1)]; prLead = first[0]; }
      }
    }
    // question+answer cards: pr is "question pronunciation — answer pronunciation".
    // Keep the question's half up top, move the answer's half down next to the answer
    // instead of lumping both together, far from the answer it belongs to.
    if (!paired && exAr.length === 1 && card.pr && card.pr.includes("—")) {
      const dash = card.pr.indexOf("—");
      prLead = card.pr.slice(0, dash).trim();
      exPr = [card.pr.slice(dash + 1).trim()];
    }
    if (listPaired) {
      html += rows(listAr, listPr, listEn);
    } else {
      if (prLead) html += '<div class="pron">' + esc(prLead) + '</div>';
      if (card.ex) {
        html += (paired || exPr)
          ? rows(exAr, exPr, exEn)
          : '<div class="example"><div class="arabic">' + esc(card.ex[0]) + '</div><div>' + esc(card.ex[1]) + '</div></div>';
      }
    }
    if (card.root) {
      const fam = (ROOT_INDEX[card.root] || []).filter(w => w.ar !== card.ar);
      let rl = '<div class="root-line"><span class="root-label">root</span> ' +
        '<span class="root-letters arabic">' + esc(card.root) + '</span>';
      if (fam.length) rl += ' <span class="root-also">— also ' + fam.slice(0, 3).map(w =>
        '<span class="arabic">' + esc(w.ar) + '</span> <span class="root-gloss">(' +
        esc(shortGloss(w.en)) + ')</span>').join(' · ') + '</span>';
      html += rl + '</div>';
    }
    if (card.note) html += '<div class="note"><span class="note-label">note</span> ' + esc(card.note) + '</div>';
    if ((card.tags || []).includes("needs-enrichment"))
      html += '<div class="hint">Quick-saved — give it to Claude to add pronunciation, root & an example</div>';
    if (card.t100) html += '<span class="top100-tag">top 100</span>';
  } else {
    if (card.kind === "phrase") html += '<div class="chunk-tag">phrase — learn it as one chunk</div>';
    html += '<div class="hint">tap to flip</div>';
  }
  body.innerHTML = html;
  $("gradeRow").style.visibility = flipped ? "visible" : "hidden";
}

function renderToday() {
  ensureToday();
  $("deckLabel").textContent = "";
  $("starBtn").style.display = "none";
  $("gradeRow").style.visibility = "hidden";
  $("doneBanner").style.display = "none";

  let due = 0;
  DECKS.forEach(d => d.cards.forEach(c => { if (isReviewDue(c.id)) due++; }));
  const hardCount = Object.keys(state.hard).filter(k => state.hard[k]).length;
  const focus = todaysFocus();
  const newDone = state.today.newDone;
  const revDone = due === 0, newStepDone = newDone >= DAILY_NEW, speakDone = !!state.today.checks.speak;
  const doneN = (revDone ? 1 : 0) + (newStepDone ? 1 : 0) + (speakDone ? 1 : 0);
  recordToday();
  const { cur, best } = streakInfo();

  $("counter").textContent = doneN + " / 3 done today";

  const step = (n, done, name, sub, actions) =>
    '<div class="step' + (done ? " done" : "") + '">' +
    '<div class="step-num">' + (done ? "✓" : n) + "</div>" +
    '<div class="step-main"><div class="step-name">' + name + "</div>" +
    '<div class="step-sub">' + sub + "</div>" +
    (actions ? '<div class="step-actions">' + actions + "</div>" : "") +
    "</div></div>";

  const dateLine = new Date().toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" });
  let html = '<div class="today"><div class="today-head">' + dateLine + "</div>" +
    '<div class="today-title">Today’s practice</div>';
  if (doneN === 3)
    html += '<div class="today-done">All done — see you tomorrow</div>';

  html += step(1, revDone, "Clear your reviews",
    revDone ? "All caught up, nothing came back due." :
      due + " card" + (due > 1 ? "s" : "") + " came back due. Clear these first.",
    revDone ? "" : '<button class="step-btn" id="todoRevBtn">Start reviews</button>');

  html += step(2, newStepDone, "Learn " + DAILY_NEW + " new cards",
    "Today’s focus: <b>" + esc(focus.name) + "</b> · " + newDone + "/" + DAILY_NEW +
    " learned. Say each one out loud.",
    '<button class="step-btn" id="todoNewBtn">Open ' + esc(focus.name) + "</button>");

  html += step(3, speakDone, "Say them out loud",
    "Flip to <b>EN → AR</b> and produce today’s words from memory" +
    (hardCount ? " — plus your " + hardCount + " hard card" + (hardCount > 1 ? "s" : "") : "") + ".",
    '<button class="step-btn" id="todoSpeakBtn">Speak mode</button>' +
    '<button class="step-btn ghost" id="todoSpeakChk">' + (speakDone ? "Undo" : "Mark done") + "</button>");

  html += '<div class="streak-wrap"><div class="streak-top">' +
    '<span class="streak-num">' + cur + "</span>" +
    '<span class="streak-lbl">day' + (cur === 1 ? "" : "s") + " in a row</span>" +
    '<span class="streak-best">best: ' + best + "</span></div>" +
    heatmapHtml() +
    '<div class="heatmap-legend">less' +
    '<span class="hm-cell l0"></span><span class="hm-cell l1"></span>' +
    '<span class="hm-cell l2"></span><span class="hm-cell l3"></span>more</div></div>';

  html += "</div>";
  $("cardBody").innerHTML = html;

  const wire = (id, fn) => { const el = $(id); if (el) el.onclick = e => { e.stopPropagation(); fn(); }; };
  wire("todoRevBtn", () => goDeck("__due"));
  wire("todoNewBtn", () => goDeck(focus.id));
  wire("todoSpeakBtn", () => goDeck(hardCount ? "__hard" : focus.id, "en2ar"));
  wire("todoSpeakChk", () => { ensureToday(); state.today.checks.speak = !state.today.checks.speak; recordToday(); save(); render(); });

  save();
}

function renderGuide() {
  $("deckLabel").textContent = "";
  $("starBtn").style.display = "none";
  $("gradeRow").style.visibility = "hidden";
  $("doneBanner").style.display = "none";
  const stubs = state.userCards.filter(c => !c.pr || !c.ex || !c.root).length;
  $("counter").textContent = state.userCards.length + " of your words" +
    (stubs ? " · " + stubs + " not finished yet" : "");
  const flash = state.flash;
  state.flash = null;
  // Only the real topic decks — skip the empty "My words" holder in the browse list.
  const browse = DECKS.filter(d => d.id !== "mine" && d.cards.length)
    .map(d => '<button class="browse-link" data-deck="' + d.id + '">' + esc(d.name) + '</button>').join("");
  $("cardBody").innerHTML =
    '<div class="add-view">' +
    (flash ? '<div class="add-flash">' + esc(flash) + '</div>' : '') +
    '<div class="guide-title">Every day</div>' +
    '<ol class="guide-steps">' +
    '<li>Open <b>Today</b>.</li>' +
    '<li>Clear the <b>Reviews</b> it shows you (old words coming back).</li>' +
    '<li>Learn the few new cards — <b>say each one out loud</b>.</li>' +
    '</ol>' +
    '<div class="guide-plain">That’s the whole routine. Do it once a day and your streak grows. ' +
    'You don’t need to pick decks — Today rotates through them for you.</div>' +

    '<div class="guide-title">Your new words each week</div>' +
    '<div class="guide-plain"><b>Best way:</b> give this week’s words to Claude (paste them in chat, or into the ' +
    '<b>inbox.md</b> file) and Claude writes them out fully — pronunciation, root, an example. ' +
    'That’s where words become proper cards.</div>' +
    '<div class="guide-plain">The box below is a <b>quick save</b> for when Claude isn’t around — type ' +
    '<code>arabic | english</code>, one per line. They save straight away so you can study them, and Claude ' +
    'finishes them off next time.</div>' +
    '<textarea class="add-box" id="addBox" placeholder="عايز | I want&#10;بكام؟ | how much is it?&#10;لسه بدري | it’s still early"></textarea>' +
    '<div class="add-actions">' +
    '<button class="step-btn" id="addSaveBtn">Save these words</button>' +
    '<button class="step-btn ghost" id="addExportBtn">Copy my words (backup)</button>' +
    '</div>' +

    '<div class="guide-title">Browse a topic <span class="guide-opt">(optional)</span></div>' +
    '<div class="browse-list">' + browse + '</div>' +
    '</div>';

  const wire = (id, fn) => { const el = $(id); if (el) el.onclick = e => { e.stopPropagation(); fn(); }; };
  document.querySelectorAll(".browse-link").forEach(b =>
    b.onclick = e => { e.stopPropagation(); goDeck(b.dataset.deck); });
  wire("addSaveBtn", () => {
    const raw = ($("addBox").value || "").split("\n").map(l => l.trim()).filter(Boolean);
    const existing = new Set();
    DECKS.forEach(d => d.cards.forEach(c => existing.add(c.ar.trim())));
    let added = 0, skipped = 0;
    const today = localDayStr();
    for (const line of raw) {
      const p = line.split("|").map(s => s.trim());
      const ar = p[0], en = p[1];
      if (!ar || !en) { skipped++; continue; }
      if (existing.has(ar)) { skipped++; continue; }
      existing.add(ar);
      const card = { ar, en, src: "tutor", added: today, tags: ["tutor"] };
      if (p[2]) card.pr = p[2];
      if (p[3] && p[4]) card.ex = [p[3], p[4]];
      state.userCards.push(card);
      added++;
    }
    if (!added && !skipped) { state.flash = "Nothing to add — paste some lines first."; save(); render(); return; }
    state.flash = "Added " + added + (skipped ? " · skipped " + skipped + " (blank or duplicate)" : "") +
      (added ? ". Enrich them next by pasting into inbox.md." : ".");
    save();
    if (added) location.reload(); else render();  // reload re-normalizes new cards into the deck
  });
  wire("addExportBtn", () => {
    const json = JSON.stringify(state.userCards, null, 2);
    navigator.clipboard.writeText(json).then(
      () => { state.flash = "Copied " + state.userCards.length + " words to clipboard as JSON."; render(); },
      () => { state.flash = "Copy failed — here is your JSON:\n" + json; render(); });
  });
}

function flip() { flipped = !flipped; render(); }
function next() { if (!order.length) return; idx = (idx + 1) % order.length; flipped = false; render(); }
function prev() { if (!order.length) return; idx = (idx - 1 + order.length) % order.length; flipped = false; render(); }
function grade(got) {
  const card = order[idx];
  if (!card) return;
  const wasNew = !state.sched[card._key];
  schedule(card._key, got ? 3 : 1);
  if (wasNew) { ensureToday(); state.today.newDone++; }
  recordToday();
  // ⏰ Due drains as you clear it; other decks stay full and just advance.
  if (state.deck === "__due") {
    if (got) {
      order.splice(idx, 1);
      if (idx >= order.length) idx = 0;
    } else {
      const c = order.splice(idx, 1)[0];
      order.splice(Math.min(idx + 4, order.length), 0, c);
      idx = idx % Math.max(order.length, 1);
    }
    flipped = false; save(); render(); return;
  }
  save(); next();
}

// Views without a flippable card (Today, What-to-do) must not flip on tap.
const NONCARD = ["__today", "__guide"];
$("card").onclick = e => { if (e.target.id !== "starBtn" && !NONCARD.includes(state.deck)) flip(); };
$("starBtn").onclick = () => {
  const card = order[idx]; if (!card) return;
  if (state.hard[card._key]) delete state.hard[card._key]; else state.hard[card._key] = 1;
  save(); render();
};
$("nextBtn").onclick = next;
$("prevBtn").onclick = prev;
$("againBtn").onclick = () => grade(false);
$("gotBtn").onclick = () => grade(true);
$("shuffleBtn").onclick = () => { buildOrder(true); render(); };
$("dirBtn").onclick = () => { state.dir = state.dir === "ar2en" ? "en2ar" : "ar2en"; flipped = false; save(); render(); };

document.addEventListener("keydown", e => {
  const typing = /^(TEXTAREA|INPUT)$/.test(document.activeElement && document.activeElement.tagName);
  if (typing || NONCARD.includes(state.deck)) return;  // don't hijack keys while typing / on non-card views
  if (e.code === "Space") { e.preventDefault(); flip(); }
  else if (e.key === "1" && flipped) grade(false);
  else if (e.key === "2" && flipped) grade(true);
  else if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft") prev();
});

ensureToday();
if (!DECKS.some(d => d.id === state.deck) && !["__hard", "__due", "__today", "__guide"].includes(state.deck)) state.deck = "__today";
buildOrder(false);
render();
</script>
</body>
</html>
